            </article>
        </section>
    </main>

    <!-- képnézegető -->
    <!-- megnyitja az aktuálisan kattintott képet majd megjeleníti és lehet lapozni a képek közt -->
    <div class="img-viewer js-img-viewer">
        <div class="img-viewer-box">
            <button class="previous-btn js-previous-btn">
                <i class="bi bi-arrow-left-circle-fill"></i>
            </button>
            <div class="img-item js-img-item"></div>
            <button class="next-btn js-next-btn">
                <i class="bi bi-arrow-right-circle-fill"></i>
            </button>
            <button class="exit-btn js-exit-btn">
                <i class="bi bi-x-square"></i>
            </button>
        </div>
    </div>

    <script src="./scripts.js"></script>
</body>

</html>
